<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="gohealthcli — Your Google Health, archived locally.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1015"/>
      <stop offset="100%" stop-color="#161a22"/>
    </linearGradient>
    <linearGradient id="accent-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7e6b" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff7e6b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff7e6b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid dots -->
  <g fill="#1e232c" opacity="0.5">
    <circle cx="60" cy="60" r="1.5"/>
    <circle cx="120" cy="60" r="1.5"/>
    <circle cx="180" cy="60" r="1.5"/>
    <circle cx="60" cy="570" r="1.5"/>
    <circle cx="1140" cy="60" r="1.5"/>
    <circle cx="1140" cy="570" r="1.5"/>
  </g>

  <!-- top-left brand: heartbeat mark + product name -->
  <g transform="translate(80, 90)">
    <g transform="translate(0, -2)" fill="none" stroke="#ff7e6b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 18 H8 L12 4 L18 30 L24 12 L28 22 H44"/>
    </g>
    <text x="56" y="24" fill="#e6e8ed" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" font-weight="500" letter-spacing="0.5">gohealthcli</text>
  </g>

  <!-- divider hairline -->
  <rect x="80" y="140" width="1040" height="1" fill="url(#accent-fade)"/>

  <!-- main tagline (serif) -->
  <g transform="translate(80, 280)">
    <text font-family="'Fraunces', 'Georgia', 'Times New Roman', serif" font-size="86" font-weight="500" fill="#f4f5f8" letter-spacing="-1.8">
      <tspan x="0" dy="0">Your Google Health,</tspan>
      <tspan x="0" dy="100" font-style="italic" fill="#ff7e6b">archived locally.</tspan>
    </text>
  </g>

  <!-- subtitle -->
  <g transform="translate(80, 520)">
    <text font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="400" fill="#8b929e" letter-spacing="0.2">
      Local-first · Read-only · SQLite Health Archive
    </text>
  </g>

  <!-- bottom-right URL -->
  <g transform="translate(1120, 580)" text-anchor="end">
    <text font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" font-weight="400" fill="#5a6068">github.com/BramVR/gohealthcli</text>
  </g>
</svg>
