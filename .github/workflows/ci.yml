name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  fmt:
    name: gofmt check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: gofmt check
        run: make fmt-check

  test:
    name: build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Node powers the command-reference generator and drift check
      # (scripts/*.mjs); pinned to the same version the pages workflow uses.
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      # ADR-0008 drift guard (issue #74): the committed docs/commands.md and
      # docs/commands/*.md must match a fresh regeneration from the binary's
      # `schema --json`. Fails with a unified diff naming the drifted file;
      # the fix is `make docs-commands` plus committing the result.
      - name: Command-reference drift check
        run: make docs-check
