name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  fmt:
    name: gofmt check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: gofmt check
        run: make fmt-check

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Lint gate (issue #279): runs the curated linter set in .golangci.yml.
      # The golangci-lint version pinned here is mirrored by
      # GOLANGCI_LINT_VERSION in the Makefile (`make lint` runs the same
      # check locally); bump both together.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Reachability-based vulnerability proof (issue #336): keep this as
      # called-vulnerability checking, not dependency update automation.
      - name: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          repo-checkout: false
          go-version-file: go.mod
          go-package: ./...
          output-format: text

  test:
    name: build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Node powers the command-reference generator and drift check
      # (scripts/*.mjs); pinned to the same version the pages workflow uses.
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      # ADR-0010 drift guard (issue #74): the committed docs/commands.md and
      # docs/commands/*.md must match a fresh regeneration from the binary's
      # `schema --json`. Fails with a unified diff naming the drifted file;
      # the fix is `make docs-commands` plus committing the result.
      - name: Command-reference drift check
        run: make docs-check

      # PRD #77 docs-site smoke test (issue #265): build the Project Site on
      # every PR so generator errors and broken internal links (the generator's
      # validateLinks() runs inside `make docs-site`) fail here instead of
      # post-merge in pages.yml. The fuller pre-deploy smoke test in pages.yml
      # stays as the deploy gate.
      - name: Build Project Site
        run: make docs-site

      - name: Smoke-test Project Site output
        run: |
          test -s dist/docs-site/index.html
          grep -q "gohealthcli" dist/docs-site/index.html
