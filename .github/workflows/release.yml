name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Stash GoReleaser config
        run: cp .goreleaser.yaml /tmp/.goreleaser.yaml

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          git fetch --tags --force
          git checkout --detach "$RELEASE_TAG"

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config /tmp/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Resolve release tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=$INPUT_TAG" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=$REF_NAME" >> "$GITHUB_ENV"
          fi

      - name: Dispatch tap formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::Skipping Homebrew tap update because HOMEBREW_TAP_TOKEN is not configured with workflow access to BramVR/homebrew-tap"
            exit 0
          fi

          request_id="gohealthcli-${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_title="Update gohealthcli for ${RELEASE_TAG} (${request_id})"

          gh workflow run update-formula.yml \
            --repo BramVR/homebrew-tap \
            --ref main \
            -f formula=gohealthcli \
            -f tag="$RELEASE_TAG" \
            -f repository=BramVR/gohealthcli \
            -f description="Local-first, read-only Google Health archive CLI" \
            -f artifact_template="{formula}_{version}_{target}.tar.gz" \
            -f request_id="$request_id"

          run_id=""
          for _ in {1..30}; do
            run_id=$(gh run list \
              --repo BramVR/homebrew-tap \
              --workflow update-formula.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle \
              --jq ".[] | select(.displayTitle == \"$expected_title\") | .databaseId" | head -n1)
            if [ -n "$run_id" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$run_id" ]; then
            echo "::error::Could not find tap workflow run with title: $expected_title"
            exit 1
          fi

          gh run watch "$run_id" \
            --repo BramVR/homebrew-tap \
            --exit-status \
            --interval 10
